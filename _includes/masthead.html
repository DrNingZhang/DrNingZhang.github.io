<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="home-site-nav" class="site-nav" aria-label="Primary navigation">
        <a class="site-nav__brand" href="/#about-me">Ning Zhang</a>
        <button class="site-nav__toggle" type="button" aria-expanded="false" aria-controls="site-nav-links" aria-label="Toggle navigation">
          <span class="navicon" aria-hidden="true"></span>
        </button>
        <ul id="site-nav-links" class="site-nav__links">
          {% for link in site.data.navigation.main %}
            <li class="masthead__menu-item"><a href="{{ domain }}{{ link.url }}">{{ link.title }}</a></li>
          {% endfor %}
        </ul>
      </nav>
    </div>
  </div>
</div>
